name: Deploy Full-Stack App

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  # ----------------------------------------------------
  # JOB 1: DEPLOY PYTHON BACKEND TO MODAL
  # ----------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Modal
        run: pip install modal

      - name: Deploy Backend to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          cd backend
          modal deploy backend.py::modal_app 

  # ----------------------------------------------------
  # JOB 2: BUILD AND DEPLOY REACT FRONTEND TO S3 & CLOUDFRONT
  # ----------------------------------------------------
  deploy-frontend:
    needs: deploy-backend # Wait for backend to deploy first
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::042722598941:role/GitHubActionsLambdaDeployRole
          aws-region: us-east-2

      - name: Install and Build React App
        env:
          # Your permanent Modal URL (Notice no '-dev' at the end!)
          VITE_API_URL: https://juicedcooky--clip-continual-learning-backend-fastapi-app.modal.run
        run: |
          cd frontend
          npm install
          npm run build

      - name: Sync Files to AWS S3 Website Bucket
        run: |
          aws s3 sync ./frontend/dist s3://continual-learning-bucket/frontend --delete

      # ====================================================
      # CLEAR THE CLOUDFRONT CACHE
      # ====================================================
      - name: Invalidate CloudFront Cache
        env:
          DISTRIBUTION_ID: E19QZ64XFJB0U2
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/*"