name: Deploy Full-Stack App to AWS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  # ----------------------------------------------------
  # JOB 1: BUILD AND DEPLOY PYTHON BACKEND TO LAMBDA
  # ----------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::042722598941:role/GitHubActionsLambdaDeployRole
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Backend Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: continual-learning-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG ./backend
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker tag $REGISTRY/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Update Lambda Function Code
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: continual-learning-app
          IMAGE_TAG: ${{ github.sha }}
          FUNCTION_NAME: continual-learning-backend
        run: |
          aws lambda update-function-code \
            --function-name $FUNCTION_NAME \
            --image-uri $REGISTRY/$REPOSITORY:$IMAGE_TAG

  # ----------------------------------------------------
  # JOB 2: BUILD AND DEPLOY REACT FRONTEND TO S3
  # ----------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::042722598941:role/GitHubActionsLambdaDeployRole
          aws-region: us-east-2

      - name: Install and Build React App
        env:
          VITE_API_URL: https://dwi6l4femhc3z22kc6tmpheheq0wdpff.lambda-url.us-east-2.on.aws/
        run: |
          cd frontend
          npm install
          npm run build

      - name: Sync Files to AWS S3 Website Bucket
        run: |
          # Added /frontend to the destination path
          aws s3 sync ./frontend/dist s3://continual-learning-bucket/frontend --delete

      # ====================================================
      # ADDED: CLEAR THE CLOUDFRONT CACHE
      # ====================================================
      - name: Invalidate CloudFront Cache
        env:
          DISTRIBUTION_ID: E19QZ64XFJB0U2 # Your exact CloudFront ID!
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/*"